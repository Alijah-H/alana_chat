<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALANA Chat - Home</title>
  <link rel="stylesheet" href="assets/css/loginstyles.css" />
  <script>
    function showForm(formType) {
      if (formType === 'signup') {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('signup-section').style.display = 'block';
      } else {
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('signup-section').style.display = 'none';
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      showForm('login'); // Default to login form
    });
  </script>
</head>
<body>
  <div class="background"></div>

  <!-- Header injected via fetch so login.html and PHP pages share the same header -->
  <div id="header-placeholder" aria-hidden="true"></div>
  <script>
    fetch('header.php')
      .then(r => {
        if (!r.ok) throw new Error('Header load failed');
        return r.text();
      })
      .then(html => document.getElementById('header-placeholder').innerHTML = html)
      .catch(() => {
        document.getElementById('header-placeholder').innerHTML =
          '<header class="site-header"><div class="logo"><a href="index.html">ALANA Chat</a></div></header>';
      });
  </script>

  <div class="content">
    <main>
      <section id="login-section" class="login-section">
        <h1>Login to ALANA Chat</h1>
        <form id="login-form" action="login.php" method="POST" autocomplete="off">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required />

          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required />

          <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="#" onclick="showForm('signup'); return false;">Sign up here</a></p>
      </section>

      <section id="signup-section" class="signup-section" style="display: none;">
        <h1>Sign Up for ALANA Chat</h1>
        <form id="signup-form" action="signup.php" method="POST" autocomplete="off">
          <label for="new-name">Full name:</label>
          <input type="text" id="new-name" name="new-name" required />

          <label for="new-username">Username:</label>
          <input type="text" id="new-username" name="new-username" required />

          <label for="new-password">Password:</label>
          <input type="password" id="new-password" name="new-password" required />

          <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="#" onclick="showForm('login'); return false;">Login here</a></p>
      </section>
    </main>
  </div>

  <!-- Footer injected via fetch -->
  <div id="footer-placeholder" aria-hidden="true"></div>
  <script>
    fetch('footer.html')
      .then(r => {
        if (!r.ok) throw new Error('Footer load failed');
        return r.text();
      })
      .then(html => document.getElementById('footer-placeholder').innerHTML = html)
      .catch(() => {
        document.getElementById('footer-placeholder').innerHTML =
          '<footer class="site-footer"><div>© ALANA Chat</div></footer>';
      });
  </script>
</body>
</html>
